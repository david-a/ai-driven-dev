<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern AI-Assisted Development</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0e17;
        --bg-slide: #0f1520;
        --surface: #161d2e;
        --surface-hover: #1c2640;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8ecf4;
        --text-muted: #8b95a8;
        --accent: #6366f1;
        --accent-glow: rgba(99, 102, 241, 0.35);
        --accent-soft: rgba(99, 102, 241, 0.12);
        --success: #34d399;
        --success-soft: rgba(52, 211, 153, 0.12);
        --warning: #fbbf24;
        --warning-soft: rgba(251, 191, 36, 0.12);
        --danger: #f87171;
        --danger-soft: rgba(248, 113, 113, 0.12);
        --highlight: #a5b4fc;
        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        --font: "DM Sans", system-ui, sans-serif;
        --mono: "JetBrains Mono", monospace;
        --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 18px;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
        height: 100vh;
        line-height: 1.5;
      }

      body[dir="ltr"] {
        font-family: var(--font);
      }

      /* Ambient background */
      .ambient {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 10%,
            rgba(99, 102, 241, 0.15),
            transparent 50%
          ),
          radial-gradient(
            ellipse 60% 50% at 85% 80%,
            rgba(52, 211, 153, 0.08),
            transparent 50%
          ),
          var(--bg);
      }

      /* Top bar */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.75rem;
        background: linear-gradient(
          to bottom,
          rgba(10, 14, 23, 0.95),
          transparent
        );
      }

      .progress-wrap {
        flex: 1;
        max-width: 280px;
        height: 4px;
        background: var(--surface);
        border-radius: 2px;
        overflow: hidden;
        margin-inline: 1.5rem;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--success));
        border-radius: 2px;
        transition: width var(--transition);
        width: 0%;
      }

      .slide-counter {
        font-size: 0.8rem;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
        min-width: 4rem;
        text-align: center;
      }

      .lang-toggle {
        display: flex;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }

      .lang-btn {
        padding: 0.4rem 0.85rem;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .lang-btn.active {
        background: var(--accent);
        color: white;
      }

      .lang-btn:hover:not(.active) {
        color: var(--text);
        background: var(--surface-hover);
      }

      /* Slides container */
      .deck {
        position: relative;
        z-index: 1;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4.5rem 2rem 5rem;
      }

      .slide {
        position: absolute;
        width: min(1100px, 92vw);
        max-height: calc(100vh - 9rem);
        overflow-y: auto;
        opacity: 0;
        visibility: hidden;
        transform: translateX(40px) scale(0.98);
        transition:
          opacity var(--transition),
          transform var(--transition),
          visibility var(--transition);
        scrollbar-width: thin;
        scrollbar-color: var(--accent) transparent;
      }

      body[dir="ltr"] .slide {
        transform: translateX(-40px) scale(0.98);
      }

      .slide.active {
        opacity: 1;
        visibility: visible;
        transform: translateX(0) scale(1);
      }

      .slide-inner {
        background: var(--bg-slide);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) + 4px);
        padding: 2.5rem 3rem;
        box-shadow: var(--shadow);
      }

      /* Typography */
      .slide-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
        margin-bottom: 0.75rem;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
        margin-bottom: 1rem;
      }

      h2 {
        font-size: clamp(1.6rem, 3.5vw, 2.2rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 1.25rem;
        line-height: 1.2;
      }

      .subtitle {
        font-size: 1.15rem;
        color: var(--text-muted);
        max-width: 36rem;
        line-height: 1.6;
      }

      /* Key quote / callout */
      .key-message {
        background: linear-gradient(
          135deg,
          var(--accent-soft),
          rgba(52, 211, 153, 0.06)
        );
        border: 1px solid rgba(99, 102, 241, 0.3);
        border-radius: var(--radius);
        padding: 1.5rem 1.75rem;
        margin: 1.5rem 0;
        font-size: 1.2rem;
        font-weight: 600;
        line-height: 1.5;
        color: var(--highlight);
        position: relative;
      }

      .key-message::before {
        content: '"';
        position: absolute;
        top: -0.25rem;
        inset-inline-start: 1rem;
        font-size: 3rem;
        opacity: 0.2;
        line-height: 1;
      }

      .key-message.danger {
        background: linear-gradient(
          135deg,
          var(--danger-soft),
          var(--warning-soft)
        );
        border-color: rgba(248, 113, 113, 0.35);
        color: #fecaca;
      }

      .key-message.success {
        background: linear-gradient(
          135deg,
          var(--success-soft),
          var(--accent-soft)
        );
        border-color: rgba(52, 211, 153, 0.35);
        color: #a7f3d0;
      }

      /* Cards grid */
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.25rem;
        transition:
          border-color 0.2s,
          transform 0.2s;
      }

      .card:hover {
        border-color: rgba(99, 102, 241, 0.35);
        transform: translateY(-2px);
      }

      .card-icon {
        font-size: 1.5rem;
        margin-bottom: 0.6rem;
      }

      .card h3 {
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      .card p {
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.45;
      }

      .card.opportunity {
        border-inline-start: 3px solid var(--success);
      }
      .card.challenge {
        border-inline-start: 3px solid var(--danger);
      }
      .card.neutral {
        border-inline-start: 3px solid var(--accent);
      }

      /* Flow / steps */
      .flow {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-top: 1.5rem;
      }

      .flow-step {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.65rem 1rem;
        font-size: 0.85rem;
        font-weight: 500;
        flex: 0 1 auto;
      }

      .flow-arrow {
        color: var(--accent);
        font-size: 1.1rem;
        opacity: 0.7;
      }

      /* Physical key labels — avoid bidi mirroring in RTL */
      .nav-keys {
        direction: ltr;
        unicode-bidi: isolate;
      }

      /* Layer stack */
      .layers {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        margin-top: 1.25rem;
      }

      .layers-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
        margin-top: 0.75rem;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .layers-legend span {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        border: 1px solid var(--border);
      }

      .layers-legend .lg-foundation {
        color: var(--success);
        background: var(--success-soft);
        border-color: rgba(52, 211, 153, 0.35);
      }
      .layers-legend .lg-checkpoint {
        color: var(--highlight);
        background: var(--accent-soft);
        border-color: rgba(99, 102, 241, 0.35);
      }
      .layers-legend .lg-final {
        color: var(--warning);
        background: var(--warning-soft);
        border-color: rgba(251, 191, 36, 0.35);
      }

      .layer {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.85rem 1.15rem;
        transition: all 0.2s;
        text-align: start;
        width: 100%;
        color: inherit;
      }

      .layer[data-tip] {
        cursor: help;
      }

      .layer[data-tip]:hover {
        border-color: rgba(99, 102, 241, 0.4);
        background: var(--surface-hover);
      }

      .layer.foundation {
        background: linear-gradient(90deg, var(--success-soft), transparent);
        border: 2px solid rgba(52, 211, 153, 0.45);
        padding: 1rem 1.2rem;
        box-shadow: 0 0 0 1px rgba(52, 211, 153, 0.08);
      }

      .layer.checkpoint {
        border-inline-start: 3px solid var(--accent);
      }

      .layer.final {
        background: linear-gradient(90deg, var(--warning-soft), transparent);
        border-inline-start: 3px solid var(--warning);
      }

      .layer-num {
        width: 1.75rem;
        height: 1.75rem;
        border-radius: 50%;
        background: var(--accent);
        color: white;
        font-size: 0.75rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .layer.foundation .layer-num {
        width: 2rem;
        height: 2rem;
        font-size: 0.85rem;
        background: var(--success);
        box-shadow: 0 0 12px rgba(52, 211, 153, 0.35);
      }

      .layer.final .layer-num {
        background: var(--warning);
        color: #1a1408;
      }

      .layer-badge {
        flex-shrink: 0;
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 0.28rem 0.55rem;
        border-radius: 999px;
        background: var(--success-soft);
        color: var(--success);
        border: 1px solid rgba(52, 211, 153, 0.4);
        white-space: nowrap;
      }

      .layer-tier-label {
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .layer.foundation .layer-tier-label {
        color: var(--success);
      }
      .layer.final .layer-tier-label {
        color: var(--warning);
      }

      .layer-info {
        flex: 1;
      }
      .layer-info strong {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
      }
      .layer-info .layer-desc {
        display: block;
        font-size: 0.82rem;
        color: var(--text-muted);
        line-height: 1.4;
      }
    .layer-info .layer-detail {
      display: block;
      font-size: 0.78rem;
      color: var(--text-muted);
      opacity: 0.85;
      margin-top: 0.25rem;
      line-height: 1.4;
    }

    .layer-extras {
      list-style: none;
      margin-top: 0.45rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .layer-extras li {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--highlight);
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

      .bullets li.has-tip {
        cursor: help;
        border-bottom: 1px dotted rgba(99, 102, 241, 0.45);
        display: inline-block;
        width: 100%;
      }

      /* Bullet list - minimal */
      .bullets {
        list-style: none;
        margin-top: 1rem;
      }

      .bullets li {
        position: relative;
        padding-inline-start: 1.35rem;
        margin-bottom: 0.65rem;
        font-size: 0.95rem;
        color: var(--text);
      }

      .bullets li::before {
        content: "";
        position: absolute;
        inset-inline-start: 0;
        top: 0.55em;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }

      /* Split layout */
      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-top: 1.25rem;
      }

      @media (max-width: 768px) {
        .split {
          grid-template-columns: 1fr;
        }
        .slide-inner {
          padding: 1.75rem;
        }
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.25rem;
      }

      .panel h3 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.75rem;
      }

      .panel.before h3 {
        color: var(--success);
      }
      .panel.live h3 {
        color: var(--warning);
      }

      /* Agenda timeline */
      .agenda {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        margin-top: 1.25rem;
      }

      .agenda-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1rem;
        background: var(--surface);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
      }

      .agenda-time {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--accent);
        min-width: 3.5rem;
        font-weight: 500;
      }

      .agenda-text {
        font-size: 0.9rem;
        flex: 1;
      }

      /* Quote wall */
      .quotes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 0.85rem;
        margin-top: 1rem;
      }

      .quote-chip {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 1rem 1.15rem;
        font-size: 0.88rem;
        font-weight: 500;
        line-height: 1.45;
        border-inline-start: 3px solid var(--accent);
      }

      /* Expand button — removed; tips use data-tip hover/click instead */

      /* Tip popover (click/touch fallback) */
      .nav-hints {
        position: fixed;
        bottom: 1.25rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        gap: 1.5rem;
        font-size: 0.72rem;
        color: var(--text-muted);
        opacity: 0.6;
      }

      .nav-hints kbd {
        display: inline-block;
        padding: 0.15rem 0.45rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 0.68rem;
        margin-inline: 0.2rem;
      }

      /* Title slide special */
      .title-slide h1 {
        background: linear-gradient(
          135deg,
          var(--text) 30%,
          var(--accent) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .title-meta {
        margin-top: 2rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .tag {
        padding: 0.35rem 0.85rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 0.78rem;
        color: var(--text-muted);
      }

      /* Tooltip */
      [data-tip] {
        position: relative;
        cursor: help;
        border-bottom: 1px dotted var(--accent);
      }

      [data-tip]::after {
        content: attr(data-tip);
        position: absolute;
        bottom: calc(100% + 8px);
        inset-inline-start: 50%;
        transform: translateX(-50%) scale(0.95);
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 0.5rem 0.75rem;
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        color: var(--text);
        white-space: nowrap;
        max-width: 260px;
        white-space: normal;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s;
        z-index: 50;
        pointer-events: none;
        box-shadow: var(--shadow);
      }

      body[dir="rtl"] [data-tip]::after {
        transform: translateX(50%) scale(0.95);
      }

      [data-tip]:hover::after {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) scale(1);
      }

      [data-tip].tip-open::after {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) scale(1);
      }

      body[dir="rtl"] [data-tip].tip-open::after {
        transform: translateX(50%) scale(1);
      }

      code {
        font-family: var(--mono);
        font-size: 0.85em;
        background: var(--surface);
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        color: var(--highlight);
      }
    </style>
  </head>
  <body dir="rtl">
    <div class="ambient"></div>

    <header class="topbar">
      <div class="slide-counter">
        <span id="current">1</span> / <span id="total">0</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress"></div>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="he" aria-label="עברית">
          עב
        </button>
        <button class="lang-btn" data-lang="en" aria-label="English">EN</button>
      </div>
    </header>

    <main class="deck" id="deck"></main>

    <footer class="nav-hints">
      <span
        ><span class="nav-keys" data-i18n-html="navSlideKeys"></span>
        <span data-i18n="navSlides">שקפים</span></span
      >
      <span><kbd>L</kbd> <span data-i18n="navLang">שפה</span></span>
      <span><kbd>F</kbd> <span data-i18n="navFull">מסך מלא</span></span>
    </footer>

    <script>

                {

                {

              ],
            },
            {

              agenda: [

                { time: "10′", text: "הזדמנויות מול אתגרים" },
                { time: "12′", text: "קווים מנחים + לולאות אימות" },

              ],
            },
            {
              label: "נרטיב",

              flow: [
                "תפוקה ↑",
                "גדרות הגנה",
                "אימות מהיר",
                "Specs = כוונה",
                "OpenSpec = לופ",
              ],
            },

                {
                  text: "Spec",
                  tip: "Explicit requirements and acceptance criteria — the source of truth for anyone implementing, testing, or approving.",
                },
                {
                  text: "Build",
                  tip: "Implement a vertical slice against the spec — AI assists, but scope decisions stay human.",
                },
                {
                  text: "Tests",
                  tip: "Verify against acceptance criteria, not 'looks reasonable to me' — CI and tests as a gate.",
                },
                {
                  text: "Traceability",
                  tip: "A clear chain: request → spec → code → verification — track what met the conditions.",
                },
              ],
            },
            {
              type: "title",
              label: "Closing",
              title: "Questions?",
              subtitle: "Thank you — we'd love to hear about your experience",
              tags: ["OpenSpec", "Q&A"],
            },
          ],
        },
      };

      let lang = "he";
      let currentSlide = 0;

      function getSlideFromUrl() {
        const raw = location.hash.replace(/^#/, "");
        if (!raw) return null;
        const n = parseInt(raw, 10);
        if (!Number.isFinite(n) || n < 1) return null;
        return n - 1;
      }

      function syncSlideToUrl() {
        const hash = `#${currentSlide + 1}`;
        if (location.hash !== hash) {
          history.replaceState(null, "", hash);
        }
      }

      function renderSlides() {
        const deck = document.getElementById("deck");
        const slides = i18n[lang].slides;
        deck.innerHTML = slides.map((s, i) => renderSlide(s, i)).join("");
        document.getElementById("total").textContent = slides.length;
        currentSlide = Math.min(
          Math.max(0, currentSlide),
          slides.length - 1,
        );
        updateSlide();
      }

      function renderSlide(s, i) {
        let inner = "";

        if (s.type === "title") {
          inner = `
          <div class="slide-label">${s.label}</div>
          <h1>${s.title}</h1>
          <p class="subtitle">${s.subtitle}</p>
          <div class="title-meta">${(s.tags || []).map((t) => `<span class="tag">${t}</span>`).join("")}</div>
        `;
          return `<section class="slide title-slide" data-index="${i}"><div class="slide-inner">${inner}</div></section>`;
        }

        inner += `<div class="slide-label">${s.label}</div><h2>${s.title}</h2>`;
        if (s.subtitle) inner += `<p class="subtitle">${s.subtitle}</p>`;
        if (s.key)
          inner += `<div class="key-message${s.keyDanger ? " danger" : ""}">${s.key}</div>`;
        if (s.subKey)
          inner += `<div class="key-message ${s.subKeyClass || "success"}">${s.subKey}</div>`;

        if (s.items) {
          inner += `<div class="cards">${s.items
            .map(
              (it) => `
          <div class="card neutral"><div class="card-icon">${it.icon}</div><h3>${it.title}</h3><p>${it.desc}</p></div>
        `,
            )
            .join("")}</div>`;
        }

        if (s.agenda) {
          inner += `<div class="agenda">${s.agenda
            .map(
              (a) => `
          <div class="agenda-item"><span class="agenda-time">${a.time}</span><span class="agenda-text">${a.text}</span></div>
        `,
            )
            .join("")}</div>`;
        }

        if (s.flow) {
          inner += `<div class="flow">${s.flow
            .map(
              (f, idx) => `
          ${idx ? `<span class="flow-arrow">${lang === "he" ? "←" : "→"}</span>` : ""}${renderFlowStep(f)}
        `,
            )
            .join("")}</div>`;
        }

        if (s.cards) {
          inner += `<div class="cards">${s.cards
            .map(
              (c) => `
          <div class="card ${c.type}"><div class="card-icon">${c.icon}</div><h3>${c.title}</h3><p>${c.desc}</p></div>
        `,
            )
            .join("")}</div>`;
        }

        if (s.bullets) {
          inner += `<ul class="bullets">${s.bullets
            .map((b) => renderListItem(b))
            .join("")}</ul>`;
        }

        if (s.layers) {
          if (s.layersLegend) {
            inner += `<div class="layers-legend">${s.layersLegend
              .map((lg) => `<span class="${lg.cls}">${lg.text}</span>`)
              .join("")}</div>`;
          }
          inner += `<div class="layers">${s.layers
            .map((l) => {
              const tier =
                l.tier || (l.foundation ? "foundation" : "checkpoint");
              return `
          <div class="layer ${tier}"${l.tip ? ` data-tip="${escapeAttr(l.tip)}"` : ""}>
            <span class="layer-num">${l.num}</span>
            <div class="layer-info">
              ${l.tierLabel ? `<span class="layer-tier-label">${l.tierLabel}</span>` : ""}
              <strong>${l.title}</strong>
              <span class="layer-desc">${l.desc}</span>
              ${l.detail ? `<span class="layer-detail">${l.detail}</span>` : ""}
              ${l.extras ? `<ul class="layer-extras">${l.extras.map((x) => `<li>${x}</li>`).join("")}</ul>` : ""}
            </div>
            ${l.badge ? `<span class="layer-badge">${l.badge}</span>` : ""}
          </div>`;
            })
            .join("")}</div>`;
        }

        if (s.split) {
          inner += `<div class="split">
          <div class="panel"><h3>${s.split.left.title}</h3><ul class="bullets">${s.split.left.items.map((x) => renderListItem(x)).join("")}</ul></div>
          <div class="panel"><h3>${s.split.right.title}</h3><ul class="bullets">${s.split.right.items.map((x) => renderListItem(x)).join("")}</ul></div>
        </div>`;
        }

        if (s.quotes) {
          inner += `<div class="quotes">${s.quotes.map((q) => `<div class="quote-chip">${q}</div>`).join("")}</div>`;
        }

        return `<section class="slide" data-index="${i}"><div class="slide-inner">${inner}</div></section>`;
      }

      function tipAttrs(item) {
        const text = typeof item === "object" ? item.text : item;
        const tip = typeof item === "object" && item.tip ? item.tip : "";
        return { text, tipAttr: tip ? ` data-tip="${escapeAttr(tip)}"` : "", hasTip: !!tip };
      }

      function renderListItem(item) {
        const { text, tipAttr, hasTip } = tipAttrs(item);
        return `<li class="${hasTip ? "has-tip" : ""}"${tipAttr}>${text}</li>`;
      }

      function renderFlowStep(item) {
        const { text, tipAttr } = tipAttrs(item);
        return `<span class="flow-step"${tipAttr}>${text}</span>`;
      }

      function escapeAttr(str) {
        return String(str).replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }

      function applyI18nChrome() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.dataset.i18n;
          if (i18n[lang][key]) el.textContent = i18n[lang][key];
        });
        document.querySelectorAll("[data-i18n-html]").forEach((el) => {
          const key = el.dataset.i18nHtml;
          if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
        });
      }

      function setLang(newLang) {
        lang = newLang;
        document.documentElement.lang = lang;
        document.body.dir = lang === "he" ? "rtl" : "ltr";
        document.querySelectorAll(".lang-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.lang === lang);
        });
        applyI18nChrome();
        const saved = currentSlide;
        renderSlides();
        currentSlide = Math.min(saved, i18n[lang].slides.length - 1);
        updateSlide();
        bindTipTriggers();
      }

      function updateSlide() {
        const slides = document.querySelectorAll(".slide");
        const total = slides.length;
        slides.forEach((s, i) =>
          s.classList.toggle("active", i === currentSlide),
        );
        document.getElementById("current").textContent = currentSlide + 1;
        document.getElementById("progress").style.width =
          `${((currentSlide + 1) / total) * 100}%`;
        syncSlideToUrl();
      }

      function nextSlide() {
        if (currentSlide < i18n[lang].slides.length - 1) {
          currentSlide++;
          updateSlide();
        }
      }

      function prevSlide() {
        if (currentSlide > 0) {
          currentSlide--;
          updateSlide();
        }
      }

      function bindTipTriggers() {
        document.querySelectorAll("[data-tip]").forEach((el) => {
          el.onclick = (e) => {
            e.stopPropagation();
            const open = el.classList.contains("tip-open");
            document
              .querySelectorAll("[data-tip].tip-open")
              .forEach((x) => x.classList.remove("tip-open"));
            if (!open) el.classList.add("tip-open");
          };
        });
      }

      document.addEventListener("click", () => {
        document
          .querySelectorAll("[data-tip].tip-open")
          .forEach((x) => x.classList.remove("tip-open"));
      });

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.onclick = () => setLang(btn.dataset.lang);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === " ") {
          e.preventDefault();
          lang === "he" ? prevSlide() : nextSlide();
        }
        if (e.key === "ArrowLeft") {
          e.preventDefault();
          lang === "he" ? nextSlide() : prevSlide();
        }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          nextSlide();
        }
        if (e.key === "ArrowUp") {
          e.preventDefault();
          prevSlide();
        }
        if (e.key === "l" || e.key === "L")
          setLang(lang === "he" ? "en" : "he");
        if (e.key === "f" || e.key === "F") {
          if (!document.fullscreenElement)
            document.documentElement.requestFullscreen();
          else document.exitFullscreen();
        }
      });

      const slideFromUrl = getSlideFromUrl();
      if (slideFromUrl !== null) currentSlide = slideFromUrl;

      window.addEventListener("hashchange", () => {
        const idx = getSlideFromUrl();
        if (idx === null || idx === currentSlide) return;
        currentSlide = Math.min(
          Math.max(0, idx),
          i18n[lang].slides.length - 1,
        );
        updateSlide();
      });

      applyI18nChrome();
      renderSlides();
      bindTipTriggers();
    </script>
  </body>
</html>
